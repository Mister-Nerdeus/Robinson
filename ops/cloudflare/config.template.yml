# Cloudflare Tunnel Config Template
# Copy this file to an untracked local path (recommended: %USERPROFILE%\\.cloudflared\\config.yml)
# and replace placeholders with operator-managed values.

# REQUIRED: replace with real tunnel UUID
# tunnel: 00000000-0000-0000-0000-000000000000

tunnel: <TUNNEL_UUID>

# REQUIRED: local credentials JSON path generated by cloudflared tunnel create/login
credentials-file: <ABSOLUTE_PATH_TO_CREDENTIALS_JSON>

ingress:
  # Demo app (in scope)
  - hostname: <DEMO_HOSTNAME>
    service: http://localhost:3001

  # Future expansion example (optional; do not enable until intentionally configured)
  # - hostname: <SECOND_SITE_HOSTNAME>
  #   service: http://localhost:<SECOND_SITE_PORT>

  # Required final catch-all
  - service: http_status:404
